services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - worldnew_uploads:/app/public/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: worldnew
      POSTGRES_USER: worldnew
      POSTGRES_PASSWORD: worldnew
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/worldnew_schema.sql:/docker-entrypoint-initdb.d/001-worldnew_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldnew -d worldnew"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  worldnew_uploads:
